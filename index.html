<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>
    <!-- Tailwind CSS for layout -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Montserrat font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- GSAP for robust animation control -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at center, #2a221b 0%, #0f0c0a 100%);
            overflow: hidden;
            perspective: 1500px;
        }

        /* Hanging lights styling */
        .light-string {
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="M0,5 Q25,15 50,5 T100,5" fill="none" stroke="%234a3b32" stroke-width="0.5"/></svg>') repeat-x;
            height: 40px;
            width: 100%;
        }
        .bulb {
            background: radial-gradient(circle at center, #fff 20%, #ffdf6d 60%, rgba(255,223,109,0) 100%);
            box-shadow: 0 0 15px #ffcc4d, 0 0 30px #ffaa00;
            animation: glow 3s ease-in-out infinite alternate;
        }
        @keyframes glow {
            0% { opacity: 0.8; box-shadow: 0 0 12px #ffcc4d; }
            100% { opacity: 1; box-shadow: 0 0 20px #ffbb00, 0 0 35px #ff8800; }
        }

        /* Backdrop overlay when full screen pop-out happens */
        #modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000000;
            opacity: 0;
            pointer-events: none;
            z-index: 80;
            transition: opacity 0.5s ease;
        }
        body.popup-active #modal-overlay {
            opacity: 0.95;
            pointer-events: auto;
        }

        /* Envelope Base Workspace */
        .envelope-container {
            position: relative;
            width: 400px;
            height: 500px;
            transform-style: preserve-3d;
        }

        /* LAYER 1: Envelope Back Background Solid */
        .envelope-back {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #b89230;
            border-radius: 6px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            z-index: 10;
        }
        
        /* LAYER 2: Real 3D Top Flap folding upwards realistically */
        .envelope-flap {
            position: absolute;
            top: 0; left: 0;
            width: 400px;
            height: 250px;
            background-color: #a48025;
            clip-path: polygon(0 0, 50% 100%, 100% 0);
            transform-origin: top center;
            z-index: 25; 
            transform-style: preserve-3d;
            backface-visibility: hidden;
        }

        /* THE MASK: Restricts visibility safely inside the envelope pocket body */
        .envelope-inner-sleeve {
            position: absolute;
            top: -600px; 
            left: 0; 
            width: 400px; 
            height: 1100px; 
            overflow: hidden; 
            z-index: 15;
            pointer-events: none;
            clip-path: inset(600px 0px 0px 0px);
        }

        /* LAYER 3: The actual moving card inside the sleeve container */
        .wedding-card {
            position: absolute;
            top: 625px; 
            left: 30px;
            width: 340px;
            height: 460px; 
            background: #fffdf9;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            pointer-events: auto;
        }

        /* LAYER 4: FIXED PERFECTLY CLOSED FRONT POCKETS */
        /* These meet exactly at the center point (200px, 250px) leaving absolutely zero open gaps on the sides */
        .envelope-pockets {
            position: absolute;
            top: 0; bottom: 0; left: 0; right: 0;
            z-index: 20; 
            pointer-events: none;
        }
        .left-pocket {
            position: absolute; top:0; bottom:0; left:0; width:200px;
            background-color: #d4ad42;
            clip-path: polygon(0 0, 100% 50%, 0 100%);
        }
        .right-pocket {
            position: absolute; top:0; bottom:0; right:0; width:200px;
            background-color: #d4ad42;
            clip-path: polygon(100% 0, 0 50%, 100% 100%);
        }
        .bottom-pocket {
            position: absolute; bottom:0; left:0; right:0; height:250px;
            background-color: #c29c37;
            clip-path: polygon(0 100%, 50% 0, 100% 100%);
        }

        /* LAYER 5: Red Wax Seal Stamp centered exactly where all flaps meet */
        .red-seal {
            position: absolute;
            top: 220px;
            left: 170px;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 35% 35%, #ff2e2e, #a80000);
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5), inset 0 0 8px rgba(0,0,0,0.4);
            z-index: 30; 
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #800000;
        }
        .red-seal::after {
            content: "♥";
            color: #ffcccc;
            font-size: 22px;
            opacity: 0.7;
        }

        /* Slider customization track */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            background: #3a3128;
            border: 1px solid #57493a;
            border-radius: 9999px;
            height: 14px;
            outline: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 36px;
            height: 36px;
            cursor: pointer;
            background: #ffd24d;
            background-image: 
                radial-gradient(circle at center, #b07200 25%, transparent 26%),
                radial-gradient(circle, #ffeb99 40%, transparent 42%);
            border: 2px solid #b08721;
            border-radius: 50%;
            box-shadow: 
                0 0 0 4px #ffd24d, 
                0 2px 8px rgba(0,0,0,0.5);
        }

        /* Floating blessings animation styles */
        .blessing-particle {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            z-index: 110;
            user-select: none;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 m-0">

    <!-- BACKGROUND MUSIC COMPONENT -->
    <audio id="bg-music" src="music.mp3" loop></audio>

    <!-- Dimming layer overlay for Pop-Out stage -->
    <div id="modal-overlay" onclick="closePopup()"></div>

    <!-- 1. HANGING CEILING LIGHTS -->
    <div id="ambient-lights" class="absolute top-0 left-0 w-full z-50 pointer-events-none flex flex-col items-center">
        <div class="light-string"></div>
        <div class="flex justify-around w-full max-w-5xl -mt-5 px-12">
            <div class="w-3 h-7 bg-amber-950 rounded-b-xs relative flex justify-center"><div class="bulb w-5 h-5 rounded-full absolute -bottom-4"></div></div>
            <div class="w-3 h-12 bg-amber-950 rounded-b-xs relative flex justify-center"><div class="bulb w-5 h-5 rounded-full absolute -bottom-4"></div></div>
            <div class="w-3 h-6 bg-amber-950 rounded-b-xs relative flex justify-center"><div class="bulb w-5 h-5 rounded-full absolute -bottom-4"></div></div>
            <div class="w-3 h-14 bg-amber-950 rounded-b-xs relative flex justify-center"><div class="bulb w-5 h-5 rounded-full absolute -bottom-4"></div></div>
            <div class="w-3 h-8 bg-amber-950 rounded-b-xs relative flex justify-center"><div class="bulb w-5 h-5 rounded-full absolute -bottom-4"></div></div>
        </div>
    </div>

    <!-- 2. HANGING FLOWERS IN CORNERS -->
    <div id="ambient-flowers-left" class="absolute top-0 left-0 w-48 h-80 opacity-50 pointer-events-none z-40">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" class="w-full h-full">
            <path d="M0,0 Q30,40 10,90 T20,160" fill="none" stroke="#4a533c" stroke-width="1.5"/>
            <path d="M0,0 Q50,20 40,70 T15,130" fill="none" stroke="#4a533c" stroke-width="1.2"/>
            <g fill="#dfc5fe" opacity="0.85">
                <circle cx="10" cy="90" r="5"/><circle cx="14" cy="95" r="4"/><circle cx="7" cy="100" r="4.5"/>
                <circle cx="20" cy="150" r="4"/>
            </g>
        </svg>
    </div>
    <div id="ambient-flowers-right" class="absolute top-0 right-0 w-48 h-80 opacity-50 pointer-events-none z-40 scale-x-[-1]">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 200" class="w-full h-full">
            <path d="M0,0 Q30,40 10,90 T20,160" fill="none" stroke="#4a533c" stroke-width="1.5"/>
            <path d="M0,0 Q50,20 40,70 T15,130" fill="none" stroke="#4a533c" stroke-width="1.2"/>
            <g fill="#dfc5fe" opacity="0.85">
                <circle cx="10" cy="90" r="5"/><circle cx="14" cy="95" r="4"/>
            </g>
        </svg>
    </div>

    <!-- Main Content Layout Section -->
    <div class="flex flex-col md:flex-row items-center justify-center gap-12 z-30 mt-16 max-w-5xl w-full">
        
        <!-- 3. LAYERED ARCHITECTURE ENVELOPE MODULE -->
        <div class="envelope-container flex-shrink-0" id="envelope-parent-zone">
            <!-- BACKGROUND BASE LAYER -->
            <div class="envelope-back" id="env-back-box"></div>

            <!-- THE MASKED SLEEVE FOR REALISTIC VISIBILITY -->
            <div class="envelope-inner-sleeve" id="env-sleeve">
                <!-- THE WEDDING INVITE CARD LAYER -->
                <div class="wedding-card" id="invitation-card">
                    <img src="card.png" alt="Haldi Ceremony Invitation" class="w-full h-full object-cover" onerror="this.src='https://i.imgur.com/GscTBeH.png'">
                </div>
            </div>

            <!-- TOP FLAP LAYER (Starts folded over down front face) -->
            <div class="envelope-flap" id="env-flap"></div>

            <!-- FRONT POCKET OVERLAYS FOREGROUND (PERFECT RECTANGLE SEAL) -->
            <div class="envelope-pockets" id="env-front-pockets">
                <div class="left-pocket"></div>
                <div class="right-pocket"></div>
                <div class="bottom-pocket"></div>
            </div>

            <!-- RED WAX SEAL EMBLEM LAYER -->
            <div class="red-seal" id="env-seal"></div>
        </div>

        <!-- 4. INTERACTIVE SIDEBAR CONTROL PANEL -->
        <div class="flex flex-col items-center bg-[#1e1713]/95 border border-amber-900/30 px-6 py-8 rounded-xl w-64 shadow-2xl text-center self-center" id="control-panel">
            <label id="slider-label" for="reveal-slider" class="text-amber-300 text-xs font-semibold tracking-widest uppercase mb-4 block">
                Slide To Open Envelope
            </label>
            
            <div class="relative w-full flex items-center justify-center">
                <input type="range" id="reveal-slider" min="0" max="100" value="0" class="w-full cursor-pointer">
            </div>
            
            <div class="flex justify-between w-full text-[10px] text-amber-500/60 uppercase tracking-widest mt-3 px-1 font-medium">
                <span>Closed</span>
                <span>Open</span>
            </div>
        </div>
        
    </div>

    <!-- GSAP SLIDER AND POP-OUT SCRIPT -->
    <script>
        const slider = document.getElementById('reveal-slider');
        const flap = document.getElementById('env-flap');
        const card = document.getElementById('invitation-card');
        const sleeve = document.getElementById('env-sleeve');
        const envBack = document.getElementById('env-back-box');
        const envPockets = document.getElementById('env-front-pockets');
        const seal = document.getElementById('env-seal');
        const controlPanel = document.getElementById('control-panel');
        const label = document.getElementById('slider-label');
        const lights = document.getElementById('ambient-lights');
        const flowersLeft = document.getElementById('ambient-flowers-left');
        const flowersRight = document.getElementById('ambient-flowers-right');
        const parentZone = document.getElementById('envelope-parent-zone');
        const music = document.getElementById('bg-music');

        let isPoppedOut = false;
        let musicStarted = false;

        // 1. Core Timeline: Realism logic mapping
        const envelopeTimeline = gsap.timeline({ paused: true });

        // Step A: Seal vanishes quickly as movement begins
        envelopeTimeline.to(seal, {
            opacity: 0,
            scale: 0.6,
            y: "-10px",
            duration: 1.5,
            ease: "power2.in"
        }, 0);

        // Step B: Real 3D Flap opens vertically upward around the upper top hinge axis
        envelopeTimeline.to(flap, {
            transform: "rotateX(180deg)",
            backgroundColor: "#b89230", 
            duration: 4.5,
            ease: "power1.inOut"
        }, 0);

        // Dynamic z-index swap: Once the flap rotates past 90 degrees, push it behind the card
        envelopeTimeline.set(flap, { zIndex: 11 }, 2.5);

        // Step C: The card starts sliding upwards completely protected by side mask clip bounds
        envelopeTimeline.to(card, {
            y: "-450px",
            duration: 5.5,
            ease: "power1.out"
        }, 4.0); 

        // 2. Track range slider input
        slider.addEventListener('input', (e) => {
            if (!musicStarted) {
                music.play().catch(error => console.log("Audio framework unblocked."));
                musicStarted = true;
            }

            if (isPoppedOut) return; 

            const progress = e.target.value / 100;
            envelopeTimeline.progress(progress);

            // Trigger Pop-Out at 100% full stretch clearance
            if (e.target.value == 100 && !isPoppedOut) {
                triggerCardPopOut();
            }
        });

        // 3. Pop-Out Function with Floating Blessings Animation
        function triggerCardPopOut() {
            isPoppedOut = true;
            document.body.classList.add('popup-active');
            label.innerText = "Click Card to Close";

            // Un-nest the card out of the sleeve entirely and put it directly on body to break clip-path bounds
            document.body.appendChild(card);

            gsap.set(card, {
                position: "fixed",
                top: "50%",
                left: "50%",
                x: "-50%",
                y: "-50%",
                zIndex: 100,
                opacity: 1
            });

            // Scale gracefully onto screen center stage
            gsap.to(card, {
                scale: 1.25,
                boxShadow: "0 30px 60px rgba(0,0,0,0.9)",
                duration: 0.8,
                ease: "back.out(1.1)",
                onComplete: spawnBlessings // Call the floating blessings effect!
            });

            // Blackout remaining interface assets safely 
            gsap.to([envBack, flap, envPockets, seal, controlPanel, lights, flowersLeft, flowersRight], {
                opacity: 0,
                duration: 0.4
            });

            card.style.cursor = "pointer";
            card.addEventListener('click', closePopup);
        }

        // Floating Blessings Spawner Engine
        function spawnBlessings() {
            if (!isPoppedOut) return;

            // Arrays containing beautiful emojis for flowers, hearts, balloons and celebratory symbols
            const particles = ["🌸", "🌹", "🌷", "🌻", "❤️", "✨", "💝", "💛", "🎈", "🎈"];
            const screenWidth = window.innerWidth;

            // Spawn 55 randomized floating items rising to the top
            for (let i = 0; i < 55; i++) {
                const element = document.createElement("div");
                element.className = "blessing-particle text-2xl md:text-3xl";
                element.innerText = particles[Math.floor(Math.random() * particles.length)];
                
                // Random starting point horizontal layout position spread across the screen
                element.style.left = Math.random() * screenWidth + "px";
                document.body.appendChild(element);

                // Animate individual blessing items climbing vertically up the layout
                gsap.to(element, {
                    y: -(window.innerHeight + 100),
                    x: "+=" + (Math.random() * 120 - 60), // Add a natural swaying motion
                    rotation: Math.random() * 360,
                    duration: Math.random() * 3 + 2.5,
                    ease: "power1.out",
                    delay: Math.random() * 0.5, // Natural staggered launch timing
                    onComplete: () => {
                        element.remove(); // Clean up memory footprint safely
                    }
                });
            }
        }

        // 4. Return/Close Function
        function closePopup() {
            if (!isPoppedOut) return;
            isPoppedOut = false;
            document.body.classList.remove('popup-active');
            label.innerText = "Slide To Open Envelope";
            slider.value = 90; 
            envelopeTimeline.progress(0.9);

            card.style.cursor = "default";
            card.removeEventListener('click', closePopup);

            // Put card safely back inside the overflow hidden slider sleeve container layout layer
            sleeve.appendChild(card);

            gsap.to(card, {
                position: "absolute",
                top: "625px", 
                left: "30px",
                x: "0%",
                y: "-450px", 
                scale: 1,
                boxShadow: "0 4px 20px rgba(0,0,0,0.3)",
                duration: 0.6,
                ease: "power2.inOut"
            });

            // Instantly bring envelope components back safely
            gsap.to([envBack, flap, envPockets, controlPanel, lights, flowersLeft, flowersRight], {
                opacity: 1,
                duration: 0.5
            });
        }
    </script>
</body>
</html>
